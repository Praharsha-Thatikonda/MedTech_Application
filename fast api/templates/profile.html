<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MedTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <a href="/" class="flex items-center text-gray-500 hover:text-blue-600 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> Back to Chat
        </a>
        <h1 class="font-bold text-lg text-gray-900">User Profile</h1>
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
            <i class="fas fa-user-circle"></i>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 lg:p-10">
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <!-- Header Background -->
            <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-600"></div>

            <div class="px-8 pb-8">
                <!-- Avatar & Basic Info -->
                <div class="relative flex justify-between items-end -mt-12 mb-8">
                    <div class="flex items-end">
                        <div class="relative">
                            <img src="{{ user.avatar_url }}"
                                class="w-24 h-24 rounded-2xl border-4 border-white shadow-md">
                            <button
                                class="absolute bottom-0 -right-2 w-8 h-8 bg-gray-800 text-white rounded-full flex items-center justify-center hover:bg-black shadow-lg border-2 border-white"><i
                                    class="fas fa-camera text-xs"></i></button>
                        </div>
                        <div class="ml-4 mb-1">
                            <h2 class="text-2xl font-bold text-gray-900">{{ user.name }}</h2>
                            <p class="text-sm text-gray-500">Member since 2024</p>
                        </div>
                    </div>
                    <button
                        class="px-6 py-2 bg-blue-50 text-blue-600 rounded-xl font-bold text-sm hover:bg-blue-100 transition-colors">Edit
                        Profile</button>
                </div>

                <!-- Form Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <h3
                            class="text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100 pb-2 mb-4">
                            Personal Info</h3>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Full Name</label>
                            <input type="text" value="{{ user.name }}"
                                class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Email</label>
                            <input type="email" value="{{ user.email }}"
                                class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Phone</label>
                            <input type="tel" value="{{ user.phone }}"
                                class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3
                            class="text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100 pb-2 mb-4">
                            Medical Stats</h3>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 mb-1">Blood Type</label>
                                <div
                                    class="w-full p-3 rounded-xl bg-blue-50/50 border border-blue-100 text-blue-800 font-bold text-sm text-center">
                                    {{ user.blood_type }}</div>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 mb-1">Age</label>
                                <input type="number" value="{{ user.age }}"
                                    class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm text-center">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Chronic Conditions</label>
                            <textarea rows="3"
                                class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">{{ user.conditions }}</textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Hospitals - MedTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <a href="/" class="flex items-center text-gray-500 hover:text-blue-600 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> Back to Chat
        </a>
        <h1 class="font-bold text-lg text-gray-900">Nearby Hospitals</h1>
        <div class="w-8 h-8 rounded-full bg-red-50 flex items-center justify-center text-red-500">
            <i class="fas fa-hospital"></i>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 lg:p-10">
        <!-- Map Placeholder (Small) -->
        <div class="h-48 bg-gray-200 rounded-2xl mb-8 flex items-center justify-center text-gray-400 cursor-pointer hover:bg-gray-300 transition-colors"
            onclick="window.location.href='/map'">
            <span class="flex items-center"><i class="fas fa-map-marked-alt mr-2"></i> Tap to view Full Interactive
                Map</span>
        </div>

        <div class="grid gap-6">
            {% for hospital in hospitals %}
            <!-- Hospital Card -->
            <div
                class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all flex flex-col md:flex-row gap-6 items-center">
                <div
                    class="w-20 h-20 bg-{{ 'red' }} rounded-2xl flex items-center justify-center text-{{ 'red' }}-500 text-3xl shrink-0">
                    <i class="fas fa-clinic-medical"></i>
                </div>
                <div class="flex-1 w-full">
                    <div class="flex justify-between items-start">
                        <h2 class="text-xl font-bold text-gray-900">{{ hospital.name }}</h2>
                        <span
                            class="bg-{{ hospital.status_color }}-100 text-{{ hospital.status_color }}-700 text-xs px-2 py-1 rounded-full font-bold">{{
                            hospital.open_hours }}</span>
                    </div>
                    <p class="text-gray-500 mt-1"><i class="fas fa-map-marker-alt mr-1 text-red-400"></i> {{
                        hospital.location }}</p>

                    <div class="flex flex-wrap gap-2 mt-4">
                        {% for tag in hospital.tags.split(',') %}
                        <span class="px-3 py-1 bg-gray-50 rounded-lg text-xs font-medium text-gray-600">{{ tag }}</span>
                        {% endfor %}
                    </div>
                </div>
                <div class="flex flex-row md:flex-col gap-2 w-full md:w-auto">
                    <button
                        class="flex-1 py-2 px-6 bg-red-50 text-red-600 rounded-xl font-bold text-sm hover:bg-red-100 border border-red-100">
                        <i class="fas fa-phone-alt mr-2"></i> Emergency
                    </button>
                    <button
                        class="flex-1 py-2 px-6 border border-gray-200 text-gray-600 rounded-xl font-bold text-sm hover:bg-gray-50">
                        Directions
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
</body>

</html>

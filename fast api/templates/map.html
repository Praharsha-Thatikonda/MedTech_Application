<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map View - MedTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body class="bg-gray-100 h-screen text-gray-800 font-sans flex flex-col">

    <!-- Navbar Overlay -->
    <nav class="absolute top-0 left-0 right-0 p-4 z-50 pointer-events-none">
        <div class="max-w-7xl mx-auto flex justify-between items-start pointer-events-auto">
            <a href="/"
                class="bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-lg text-gray-600 hover:text-blue-600 transition-colors font-medium text-sm flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> back
            </a>

            <div class="bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-lg flex items-center space-x-2">
                <input type="text" id="area-search" placeholder="Search area..."
                    class="bg-transparent border-none focus:ring-0 text-sm w-48">
                <button class="text-blue-600" onclick="searchArea()"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </nav>

    <!-- Map Container -->
    <main class="flex-1 bg-gray-200 relative">
        <div id="map" class="w-full h-full z-0"></div>

        <!-- Floating Panel -->
        <div
            class="absolute bottom-8 left-1/2 transform -translate-x-1/2 bg-white rounded-2xl shadow-2xl p-2 flex space-x-2 z-10">
            <button onclick="filterMarkers('hospital')"
                class="px-4 py-2 rounded-xl bg-blue-50 text-blue-600 font-bold text-xs hover:bg-blue-100 transition-colors"
                id="filter-hospitals">Hospitals</button>
            <button onclick="filterMarkers('clinic')"
                class="px-4 py-2 rounded-xl hover:bg-gray-50 text-gray-600 font-bold text-xs transition-colors"
                id="filter-clinics">Clinics</button>
            <button onclick="filterMarkers('pharmacy')"
                class="px-4 py-2 rounded-xl hover:bg-gray-50 text-gray-600 font-bold text-xs transition-colors"
                id="filter-pharmacies">Pharmacies</button>
        </div>
    </main>

    <script>
        // Init Map (Default: New York)
        var map = L.map('map').setView([40.7128, -74.0060], 13);

        // OpenStreetMap Layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Locations Data
        var locations = [
            { lat: 40.7128, lng: -74.0060, name: "City General Hospital", type: "hospital", color: "red" },
            { lat: 40.7300, lng: -73.9950, name: "Downtown Clinic", type: "clinic", color: "blue" },
            { lat: 40.7580, lng: -73.9855, name: "Times Square Pharmacy", type: "pharmacy", color: "green" },
            { lat: 40.7829, lng: -73.9654, name: "Central Park Emergency", type: "hospital", color: "red" },
            { lat: 40.7484, lng: -73.9857, name: "Empire Health", type: "clinic", color: "blue" }
        ];

        var markers = [];

        function addMarkers(typeFilter) {
            // Clear existing
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            locations.forEach(loc => {
                if (typeFilter === 'all' || loc.type === typeFilter) {
                    var iconColor = loc.type === 'hospital' ? 'red' : (loc.type === 'clinic' ? 'blue' : 'green');

                    // Custom marker styling (simple circle)
                    var marker = L.circleMarker([loc.lat, loc.lng], {
                        color: iconColor,
                        fillColor: iconColor,
                        fillOpacity: 0.8,
                        radius: 8
                    }).addTo(map);

                    marker.bindPopup(`<b>${loc.name}</b><br>${loc.type.charAt(0).toUpperCase() + loc.type.slice(1)}`);
                    markers.push(marker);
                }
            });
        }

        // Initial Load
        addMarkers('all');

        // Filter Function
        function filterMarkers(type) {
            addMarkers(type);

            // Update Button Styles
            document.querySelectorAll('button[id^="filter-"]').forEach(btn => {
                btn.classList.remove('bg-blue-50', 'text-blue-600');
                btn.classList.add('hover:bg-gray-50', 'text-gray-600');
            });

            const activeBtn = document.getElementById(`filter-${type}s`); // crude plural handling
            if (activeBtn) {
                activeBtn.classList.remove('hover:bg-gray-50', 'text-gray-600');
                activeBtn.classList.add('bg-blue-50', 'text-blue-600');
            }
        }

        // Search Function (Simulation)
        function searchArea() {
            const query = document.getElementById('area-search').value;
            if (query.toLowerCase().includes('new york')) {
                map.setView([40.7128, -74.0060], 13);
            } else if (query.toLowerCase().includes('london')) {
                map.setView([51.5074, -0.1278], 13);
                // Demo: Add London Marker just to show change
                L.marker([51.5074, -0.1278]).addTo(map)
                    .bindPopup('London Medical Center').openPopup();
            } else {
                alert('Location not found in demo database');
            }
        }
    </script>
</body>

</html>

<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lab - MedTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 font-sans flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <a href="{% url 'index' %}" class="flex items-center text-gray-500 hover:text-blue-600 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> Back to Chat
        </a>
        <h1 class="font-bold text-lg text-gray-900">AI Diagnostics Lab</h1>
        <div class="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center text-purple-600">
            <i class="fas fa-microscope"></i>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center p-6 text-center">
        <div class="bg-white p-10 rounded-3xl shadow-xl max-w-2xl border border-purple-50">
            <div
                class="w-24 h-24 bg-purple-50 rounded-full flex items-center justify-center mx-auto mb-6 text-purple-600 text-4xl shadow-inner">
                <i class="fas fa-dna"></i>
            </div>

            <h2 class="text-3xl font-bold text-gray-900 mb-4">Advanced Diagnostics Engine</h2>
            <p class="text-gray-500 mb-8 leading-relaxed max-w-md mx-auto">Upload complex medical imaging (X-Ray, MRI)
                or lab PDFs for a comprehensive AI-driven analysis. Our models detect anomalies with high precision.</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div
                    class="border-2 border-dashed border-gray-200 rounded-2xl p-6 hover:border-purple-300 hover:bg-purple-50 transition-colors cursor-pointer group">
                    <i
                        class="fas fa-file-pdf text-3xl text-gray-300 group-hover:text-purple-500 mb-2 transition-colors"></i>
                    <p class="font-bold text-sm text-gray-600">Upload Report (PDF)</p>
                </div>
                <div
                    class="border-2 border-dashed border-gray-200 rounded-2xl p-6 hover:border-purple-300 hover:bg-purple-50 transition-colors cursor-pointer group">
                    <i
                        class="fas fa-x-ray text-3xl text-gray-300 group-hover:text-purple-500 mb-2 transition-colors"></i>
                    <p class="font-bold text-sm text-gray-600">Upload Imagery</p>
                </div>
            </div>

            <button
                class="px-8 py-3 bg-purple-600 text-white rounded-xl font-bold shadow-lg hover:bg-purple-700 transition-transform hover:scale-105">Start
                Analysis Demo</button>
        </div>
    </main>
</body>

</html>

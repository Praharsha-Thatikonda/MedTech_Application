<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Hospitals - MedTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <a href="{{ url_for('home') }}" class="flex items-center text-gray-500 hover:text-blue-600 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> Back to Chat
        </a>
        <h1 class="font-bold text-lg text-gray-900">Nearby Hospitals</h1>
        <div class="w-8 h-8 rounded-full bg-red-50 flex items-center justify-center text-red-500">
            <i class="fas fa-hospital"></i>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 lg:p-10">
        <!-- Map Placeholder (Small) -->
        <div class="h-48 bg-gray-200 rounded-2xl mb-8 flex items-center justify-center text-gray-400">
            <span class="flex items-center"><i class="fas fa-map-marked-alt mr-2"></i> Interactive Map Preview</span>
        </div>

        <div class="grid gap-6">
            <!-- Hospital Card 1 -->
            <div
                class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all flex flex-col md:flex-row gap-6 items-center">
                <div
                    class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 text-3xl shrink-0">
                    <i class="fas fa-clinic-medical"></i>
                </div>
                <div class="flex-1 w-full">
                    <div class="flex justify-between items-start">
                        <h2 class="text-xl font-bold text-gray-900">City General Hospital</h2>
                        <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-bold">Open
                            24/7</span>
                    </div>
                    <p class="text-gray-500 mt-1"><i class="fas fa-map-marker-alt mr-1 text-red-400"></i> 123 Health
                        Ave, Metro City (Near Central Park)</p>

                    <div class="flex flex-wrap gap-2 mt-4">
                        <span class="px-3 py-1 bg-gray-50 rounded-lg text-xs font-medium text-gray-600">Trauma
                            Center</span>
                        <span class="px-3 py-1 bg-gray-50 rounded-lg text-xs font-medium text-gray-600">ICU</span>
                        <span
                            class="px-3 py-1 bg-gray-50 rounded-lg text-xs font-medium text-gray-600">Pediatrics</span>
                    </div>
                </div>
                <div class="flex flex-row md:flex-col gap-2 w-full md:w-auto">
                    <button
                        class="flex-1 py-2 px-6 bg-red-50 text-red-600 rounded-xl font-bold text-sm hover:bg-red-100 border border-red-100">
                        <i class="fas fa-phone-alt mr-2"></i> Emergency
                    </button>
                    <button
                        class="flex-1 py-2 px-6 border border-gray-200 text-gray-600 rounded-xl font-bold text-sm hover:bg-gray-50">
                        Directions
                    </button>
                </div>
            </div>

            <!-- Hospital Card 2 -->
            <div
                class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all flex flex-col md:flex-row gap-6 items-center">
                <div
                    class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 text-3xl shrink-0">
                    <i class="fas fa-hospital-alt"></i>
                </div>
                <div class="flex-1 w-full">
                    <div class="flex justify-between items-start">
                        <h2 class="text-xl font-bold text-gray-900">St. Mary's Clinic</h2>
                        <span class="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded-full font-bold">Closes 8
                            PM</span>
                    </div>
                    <p class="text-gray-500 mt-1"><i class="fas fa-map-marker-alt mr-1 text-red-400"></i> 45 West
                        Street, Downtown</p>

                    <div class="flex flex-wrap gap-2 mt-4">
                        <span class="px-3 py-1 bg-gray-50 rounded-lg text-xs font-medium text-gray-600">General
                            Medicine</span>
                        <span class="px-3 py-1 bg-gray-50 rounded-lg text-xs font-medium text-gray-600">Pharmacy</span>
                    </div>
                </div>
                <div class="flex flex-row md:flex-col gap-2 w-full md:w-auto">
                    <button
                        class="flex-1 py-2 px-6 bg-white border border-gray-200 text-gray-600 rounded-xl font-bold text-sm hover:bg-gray-50">
                        <i class="fas fa-phone-alt mr-2"></i> Call Now
                    </button>
                    <button
                        class="flex-1 py-2 px-6 border border-gray-200 text-gray-600 rounded-xl font-bold text-sm hover:bg-gray-50">
                        Directions
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
